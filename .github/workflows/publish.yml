name: Publicar Documentación con Versiones

on:
  push:
    branches:
      - main
      - master
  release:
    types: [published] # Se activa cuando creas una Release en GitHub

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Vital para que mike vea las otras versiones

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Configurar usuario de Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Desplegar con mike
        run: |
          # Si el evento es una Release, usamos el nombre del tag (ej: v1.0)
          # Si es un push normal a main, actualizamos 'latest' con el título 'Última Versión'
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION_NAME="${{ github.event.release.tag_name }}"
            echo "Desplegando versión oficial: $VERSION_NAME"
            mike deploy --push --update-aliases "$VERSION_NAME" latest
            # Opcional: Si quieres que al crear una release, el título de 'latest' no cambie
            mike relabel latest "Última Versión" --push
          else
            echo "Actualizando versión de desarrollo (latest)"
            mike deploy --push --update-aliases --title "Última Versión" latest
          fi
          
          # Establecemos 'latest' como la versión por defecto al entrar a la raíz
          mike set-default --push latest