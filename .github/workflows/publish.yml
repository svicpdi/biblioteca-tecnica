name: Publicar Documentación con Versiones

on:
  push:
    branches:
      - main
      - master
  release:
    types: [published] # Se activa cuando creas una Release en GitHub

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Vital para que mike vea las otras versiones

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Configurar usuario de Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Desplegar con mike
        run: |
          # 1. Asegurar que git tiene acceso a la rama de despliegue (gh-pages)
          # A veces Actions borra el tracking remoto en checkouts limpios
          git fetch origin gh-pages:gh-pages || true

          # 2. Lógica de despliegue según el evento
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION_NAME="${{ github.event.release.tag_name }}"
            echo "Desplegando versión oficial: $VERSION_NAME"
            
            # Despliega la versión tag (ej: v1.1.0) y actualiza el alias 'latest' para que apunte a ella
            mike deploy --push --update-aliases "$VERSION_NAME" latest
            
            # Corrección: Usamos 'retitle' en lugar de 'relabel'
            mike retitle --push latest "Última Versión"
          else
            echo "Actualizando versión de desarrollo (latest)"
            # Despliega directamente sobre la versión 'latest' y le pone el título
            mike deploy --push --title "Última Versión" latest
          fi
          
          # 3. Asegurar que la raíz redirige a 'latest'
          mike set-default --push latest